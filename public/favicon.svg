<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Caretta</title>
<defs>
  <linearGradient id="fw" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#D2F1EA"/>
    <stop offset="100%" stop-color="#8FD2E2"/>
  </linearGradient>
  <linearGradient id="fs" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3FC79E"/>
    <stop offset="100%" stop-color="#1D9E75"/>
  </linearGradient>
  <clipPath id="fc"><rect x="0" y="0" width="32" height="32" rx="8"/></clipPath>
</defs>

<g clip-path="url(#fc)">
  <rect x="0" y="0" width="32" height="32" fill="url(#fw)"/>
</g>
<rect x="0" y="0" width="32" height="32" rx="8" fill="none" stroke="#0F766E" stroke-width="1.5" opacity="0.85"/>

<!-- Turtle at 16,17 -->
<g transform="translate(16,17)">
  <!-- Front flippers -->
  <g transform="translate(-7.5,-5) rotate(-26)"><ellipse cx="0" cy="0" rx="3.2" ry="2" fill="#34B894" stroke="#0F6E56" stroke-width="0.7"/></g>
  <g transform="translate(7.5,-5) rotate(26)"><ellipse cx="0" cy="0" rx="3.2" ry="2" fill="#34B894" stroke="#0F6E56" stroke-width="0.7"/></g>
  <!-- Rear flippers -->
  <g transform="translate(-6.5,6) rotate(28)"><ellipse cx="0" cy="0" rx="2.4" ry="1.4" fill="#34B894" stroke="#0F6E56" stroke-width="0.7"/></g>
  <g transform="translate(6.5,6) rotate(-28)"><ellipse cx="0" cy="0" rx="2.4" ry="1.4" fill="#34B894" stroke="#0F6E56" stroke-width="0.7"/></g>
  <!-- Tail -->
  <path d="M0 8 l-1.4 3 h2.8 z" fill="#2AA17D" stroke="#0F6E56" stroke-width="0.7" stroke-linejoin="round"/>
  <!-- Head -->
  <ellipse cx="0" cy="-8.5" rx="2.8" ry="3.2" fill="#2AA17D" stroke="#0F6E56" stroke-width="0.7"/>
  <!-- Eyes -->
  <circle cx="-1" cy="-9.2" r="0.7" fill="#0B3B30"/>
  <circle cx="1" cy="-9.2" r="0.7" fill="#0B3B30"/>
  <!-- Shell -->
  <ellipse cx="0" cy="0.5" rx="7.5" ry="8.8" fill="url(#fs)" stroke="#0F6E56" stroke-width="0.9"/>
  <path d="M0 -6 L0 7 M-6 -1.5 L6 -1.5 M-5.5 3.5 L5.5 3.5" stroke="#0F6E56" stroke-width="0.7" opacity="0.4" fill="none"/>
</g>
</svg>
